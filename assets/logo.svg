<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-label="Coco Addict logo">
  <!-- Cocktail umbrella (left, tilted) -->
  <g>
    <path d="M42 96 L88 44 L118 96 Z" fill="currentColor" stroke="currentColor" stroke-width="4"/>
    <line x1="58" y1="96" x2="74" y2="66" stroke="#ffffff" stroke-width="3"/>
    <line x1="80" y1="96" x2="88" y2="54" stroke="#ffffff" stroke-width="3"/>
    <line x1="100" y1="96" x2="98" y2="70" stroke="#ffffff" stroke-width="3"/>
    <line x1="88" y1="96" x2="118" y2="140" stroke="currentColor" stroke-width="6"/>
  </g>

  <!-- Syringe (right, tilted) -->
  <g transform="rotate(18 200 96)" stroke-width="5">
    <line x1="172" y1="24" x2="232" y2="24" stroke-width="7"/>
    <line x1="202" y1="24" x2="202" y2="54"/>
    <rect x="183" y="54" width="38" height="6" fill="currentColor" stroke="none"/>
    <path d="M181 60 L181 132 L223 132 L223 60 Z" stroke-width="6"/>
    <line x1="188" y1="72"  x2="200" y2="72"  stroke-width="3"/>
    <line x1="188" y1="84"  x2="200" y2="84"  stroke-width="3"/>
    <line x1="188" y1="96"  x2="200" y2="96"  stroke-width="3"/>
    <line x1="188" y1="108" x2="200" y2="108" stroke-width="3"/>
    <line x1="188" y1="120" x2="200" y2="120" stroke-width="3"/>
    <path d="M181 132 L195 148 L209 148 L223 132" stroke-width="6"/>
    <line x1="202" y1="148" x2="202" y2="180" stroke-width="5"/>
  </g>

  <!-- Coconut bowl -->
  <circle cx="150" cy="188" r="82" stroke-width="7"/>

  <!-- Top rim / opening arc -->
  <path d="M82 138 Q 150 104 218 138" stroke-width="6"/>

  <!-- Drips from the rim -->
  <line x1="100" y1="142" x2="100" y2="156" stroke-width="5"/>
  <line x1="122" y1="132" x2="122" y2="160" stroke-width="5"/>
  <line x1="150" y1="126" x2="150" y2="166" stroke-width="5"/>
  <line x1="178" y1="132" x2="178" y2="158" stroke-width="5"/>
  <line x1="200" y1="142" x2="200" y2="154" stroke-width="5"/>
</svg>
